<!DOCTYPE html>
<html>
<head>
    <title>IoT Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; }
        .container { width: 80%; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Real-Time Sensor Telemetry</h2>
        <canvas id="myChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Temp (°C)', borderColor: 'red', data: [], tension: 0.3 },
                { label: 'Moisture (%)', borderColor: 'blue', data: [], tension: 0.3 },
                { label: 'Gas (ppm)', borderColor: 'green', data: [], tension: 0.3 }
            ]},
            options: { scales: { y: { beginAtZero: false } } }
        });

        async function updateChart() {
            const res = await fetch('http://127.0.0.1:8000/api/telemetry');
            const data = await res.json();
            
            // Refresh data (showing last 10 points)
            myChart.data.labels = data.map(d => new Date(d.timestamp).toLocaleTimeString()).reverse();
            myChart.data.datasets[0].data = data.map(d => d.temperature).reverse();
            myChart.data.datasets[1].data = data.map(d => d.moisture).reverse();
            myChart.data.datasets[2].data = data.map(d => d.gas_ppm).reverse();
            myChart.update();
        }

        setInterval(updateChart, 3000); // Update every 3 seconds
    </script>
</body>
</html>
